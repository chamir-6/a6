  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 30px;
      padding: 40px 35px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 60px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06);
      animation: slideUp 0.8s ease-out;
      border: 2px solid #000000;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(50px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar-container {
      position: relative;
      display: inline-block;
      margin-bottom: 20px;
    }

    .avatar {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #000000;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }

    .status-dot {
      position: absolute;
      bottom: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      background: #000000;
      border-radius: 50%;
      border: 3px solid #ffffff;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,0,0,0.4); }
      50% { box-shadow: 0 0 0 12px rgba(0,0,0,0); }
    }

    .name {
      font-size: 28px;
      font-weight: 700;
      color: #000000;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    .handle {
      font-size: 14px;
      color: #333333;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .bio {
      font-size: 14px;
      color: #555555;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 24px;
      border-radius: 16px;
      text-decoration: none;
      color: #ffffff;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      border: 2px solid #000000;
      cursor: pointer;
    }

    .link-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s;
    }

    .link-btn:hover::before {
      left: 100%;
    }

    .link-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    .instagram { background: #000000; }
    .tiktok { background: #000000; }
    .snapchat { background: #000000; color: #ffffff !important; }
    .facebook { background: #000000; }

    .icon {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      color: #888888;
    }

    .share-btn {
      margin-top: 20px;
      padding: 12px 30px;
      background: #000000;
      color: #ffffff;
      border: 2px solid #000000;
      border-radius: 25px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
    }

    .share-btn:hover {
      background: #ffffff;
      color: #000000;
      transform: scale(1.05);
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: -1;
    }

    .particle {
      position: absolute;
      width: 8px; height: 8px;
      background: rgba(0,0,0,0.08);
      border-radius: 50%;
      animation: float 15s infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>

<script>
  const particlesContainer = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 15 + 's';
    particle.style.animationDuration = (10 + Math.random() * 10) + 's';
    particle.style.width = particle.style.height = (5 + Math.random() * 15) + 'px';
    particlesContainer.appendChild(particle);
  }

  function shareProfile() {
    const shareData = {
      title: '么مᵢᵣ ⚜️ - Social Links',
      text: 'Check out my social media profiles!',
      url: window.location.href
    };

    if (navigator.share) {
      navigator.share(shareData);
    } else {
      navigator.clipboard.writeText(window.location.href);
      const btn = document.querySelector('.share-btn');
      const original = btn.textContent;
      btn.textContent = '✅ Copied!';
      setTimeout(() => btn.textContent = original, 2000);
    }
  }
</script>
