    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #000000;
      --text: #000000;
      --text-light: #666666;
      --bg: #f8f8f8;
      --card-bg: #ffffff;
      --border: #e8e8e8;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Subtle grid pattern background */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image:
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      background: var(--card-bg);
      border-radius: 28px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.06);
      animation: slideUp 0.6s ease-out;
      border: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar-container {
      position: relative;
      display: inline-block;
      margin-bottom: 18px;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--primary);
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .status-dot {
      position: absolute;
      bottom: 6px;
      right: 6px;
      width: 18px;
      height: 18px;
      background: var(--primary);
      border-radius: 50%;
      border: 2px solid var(--card-bg);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,0,0,0.2); }
      50% { box-shadow: 0 0 0 8px rgba(0,0,0,0); }
    }

    .name {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
      letter-spacing: 0.5px;
    }

    .handle {
      font-size: 11px;
      color: var(--text-light);
      font-weight: 600;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    .bio {
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 20px;
      border-radius: 12px;
      text-decoration: none;
      color: var(--card-bg);
      font-weight: 500;
      font-size: 13px;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      border: 1.5px solid var(--primary);
      background: var(--primary);
      cursor: pointer;
    }

    .link-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.12);
      background: var(--card-bg);
      color: var(--primary);
    }

    .link-btn:hover .icon {
      fill: var(--primary);
    }

    .icon {
      width: 18px;
      height: 18px;
      fill: currentColor;
      transition: fill 0.25s ease;
    }

    .share-btn {
      margin-top: 18px;
      padding: 10px 28px;
      background: transparent;
      color: var(--primary);
      border: 1.5px solid var(--primary);
      border-radius: 20px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .share-btn:hover {
      background: var(--primary);
      color: var(--card-bg);
      transform: scale(1.03);
    }

    .footer {
      margin-top: 18px;
      font-size: 11px;
      color: var(--text-light);
      font-style: italic;
      opacity: 0.7;
    }

    /* Desktop View */
    @media (min-width: 768px) {
      body {
        padding: 40px;

      }

      .share-btn {
        padding: 11px 30px;
        font-size: 13px;
      }

      .footer {
        font-size: 12px;
      }
    }

    /* Large Desktop */
    @media (min-width: 1200px) {
      .card {
        max-width: 420px;
        padding: 50px 42px;
      }
    }
  </style>

  function shareProfile() {
